services:
  - type: web
    name: captain-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: hypercorn app:app --bind 0.0.0.0:$PORT
    envVars:
      - key: API_ID
        sync: false
      - key: API_HASH
        sync: false
      - key: STRING_SESSION
        sync: false
      - key: GROUP_ID
        sync: false
      - key: API_KEY
        sync: false
